name: Synthetic Checks

on:
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

jobs:
  synthetics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run health and critical-path checks
        env:
          ADMIN_API_TOKEN: ${{ secrets.SYNTHETIC_ADMIN_API_TOKEN }}
          CUSTOMER_API_TOKEN: ${{ secrets.SYNTHETIC_CUSTOMER_API_TOKEN }}
        run: ./deploy/scripts/synthetic-checks.sh "${{ secrets.APP_BASE_URL }}"
