name: Backend nightly

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

env:
  CI_NODE_VERSION: "20"

jobs:
  integration-test:
    name: Full integration suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: strongpassword
          POSTGRES_DB: ecommerce_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce_user -d ecommerce_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      NODE_ENV: test
      APP_BASE_URL: http://127.0.0.1:4000
      ADMIN_APP_URL: http://127.0.0.1:5174
      CUSTOMER_APP_URL: http://127.0.0.1:3001
      MOBILE_APP_URL: http://127.0.0.1:3002
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:5174,http://127.0.0.1:5174
      DATABASE_URL: postgresql://ecommerce_user:strongpassword@localhost:5432/ecommerce_db
      REDIS_URL: redis://127.0.0.1:6379
      SESSION_SECRET: nightly-session-secret-at-least-32-characters
      EMAIL_PROVIDER: none
      STORAGE_PROVIDER: none
      ALLOW_DEV_AUTH_BYPASS: "true"
      PAYSTACK_SECRET_KEY: test-secret
      PAYSTACK_WEBHOOK_SECRET: test-secret
      PAYSTACK_VERIFY_TRANSACTIONS: "false"
      PUBLIC_SUPPORT_CAPTCHA_ENABLED: "true"
      ABUSE_CHALLENGE_PROVIDER: turnstile
      TURNSTILE_SITE_KEY: test-site-key
      TURNSTILE_SECRET_KEY: test-secret
      TURNSTILE_EXPECTED_HOSTNAMES: 127.0.0.1,localhost
      PAYSTACK_ALLOWED_WEBHOOK_IPS: 127.0.0.1,::1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma validate
      - run: npx prisma migrate deploy
      - run: npm run test:integration
      - run: npm run typecheck
      - run: npm run build -- --pretty false
      - name: Production dependency audit (critical)
        run: npm audit --omit=dev --audit-level=critical
