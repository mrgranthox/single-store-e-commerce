name: Frontend CI

on:
  workflow_dispatch: {}
  pull_request:
    branches:
      - main
      - master
    paths:
      - "admin-frontend/**"
      - "customer-frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "admin-frontend/**"
      - "customer-frontend/**"
      - ".github/workflows/frontend-ci.yml"

env:
  CI_NODE_VERSION: "20"

permissions:
  contents: read

jobs:
  admin-frontend:
    name: Admin frontend quality gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json
      - run: npm ci
      - run: npm run verify:enterprise
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - run: npm run verify:perf-budget

  customer-frontend:
    name: Customer frontend typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: customer-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.CI_NODE_VERSION }}
          cache: npm
          cache-dependency-path: customer-frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
