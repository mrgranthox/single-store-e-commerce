<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>NORDIC | Login</title>

                        "inverse-surface": "#213145",
                        "surface-container-highest": "#d3e4fe",
                        "surface-tint": "#565e74",
                        "surface-container-high": "#dce9ff",
                        "secondary-fixed-dim": "#b4c5ff",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .brand-logo {
            font-family: 'Manrope', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Subtle Editorial Background Element -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -right-[10%] w-[80%] h-[50%] bg-surface-container-low rounded-full blur-[120px] opacity-60"></div>
<div class="absolute bottom-[5%] -left-[5%] w-[60%] h-[40%] bg-surface-variant rounded-full blur-[100px] opacity-40"></div>
</div>
<main class="relative z-10 flex-1 flex flex-col items-center justify-center px-8 pt-12 pb-8">
<!-- Brand Identity Section -->
<div class="mb-16 text-center">
<div class="inline-flex items-center justify-center mb-6">
<span class="brand-logo text-4xl font-black tracking-tighter text-slate-900">NORDIC</span>
</div>
<p class="font-headline text-on-primary-container text-sm font-medium tracking-widest uppercase">The Digital Atelier</p>
</div>
<!-- Login Form Container -->
<div class="w-full max-w-sm space-y-8">
<!-- Credentials Section -->
<div class="space-y-4">
<div class="relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5 ml-1">Email Address</label>
<input class="w-full h-14 px-5 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all duration-300" placeholder="atelier@nordic.design" type="email"/>
</div>
<div class="relative">
<label class="block text-[10px] font-bold uppercase tracking-widest text-outline mb-1.5 ml-1">Password</label>
<input class="w-full h-14 px-5 bg-surface-container-high border-none rounded-xl text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all duration-300" placeholder="••••••••" type="password"/>
</div>
<div class="flex justify-end">
<button class="text-xs font-semibold text-secondary hover:opacity-70 transition-opacity">Forgot password?</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary text-on-primary rounded-xl font-headline font-bold text-sm tracking-wide shadow-xl shadow-primary/10 active:scale-95 transition-transform duration-200">
                Sign In
            </button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold text-outline uppercase tracking-tighter">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Sign-in (Large Tap Targets) -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-14 bg-surface-container-lowest rounded-xl border border-outline-variant/20 hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<img alt="Google" class="w-5 h-5" data-alt="clean vector google logo with multi-colored G icon on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCooCeMf6plx2rCYuqmWfGYl6B3oKoA-nqS5tVqP7ekF-dqsI-17okKVrggva0z51C5kt5bWIKZBq3-yyiRxH9S3nlvtIAZ1bHKxtxxf5o8tKBjHmyF01tHwnCll7NovdEZe2aY_pVj08pNr3AcZXHDrJ3785Y28Mu1vNRFUsls-KVxN2aBNDrqcXOrBjXHmgBOTY9tvB7w6T5hnrmzhmibqwVyfL51S7yMTEPiQshvIeOOuIFs4SRCZvpFWf4qwhEfYJtzhBSP3gIr"/>
<span class="ml-3 text-sm font-semibold text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center h-14 bg-surface-container-lowest rounded-xl border border-outline-variant/20 hover:bg-surface-container-low transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-xl text-on-surface" data-weight="fill">ios</span>
<span class="ml-3 text-sm font-semibold text-on-surface">Apple</span>
</button>
</div>
</div>
<!-- Secondary Journey -->
<div class="mt-auto pt-12 text-center">
<p class="text-sm text-on-primary-container">
                New to the atelier? 
                <button class="font-bold text-primary ml-1 underline decoration-secondary/30 underline-offset-4">Create Account</button>
</p>
</div>
</main>
<!-- Footer Trust Indicators -->
<footer class="relative z-10 px-8 py-6 flex justify-between items-center opacity-40">
<span class="text-[10px] font-medium tracking-widest uppercase">Privacy Policy</span>
<div class="flex space-x-4">
<span class="material-symbols-outlined text-lg">verified_user</span>
<span class="material-symbols-outlined text-lg">encrypted</span>
</div>
<span class="text-[10px] font-medium tracking-widest uppercase">Terms</span>
</footer>
</body></html>
