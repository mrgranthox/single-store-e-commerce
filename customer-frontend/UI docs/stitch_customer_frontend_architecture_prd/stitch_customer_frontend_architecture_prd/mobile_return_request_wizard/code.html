<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
<title>NORDIC | Return Request</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "inverse-on-surface": "#eaf1ff",
              "on-secondary-container": "#fefcff",
              "error": "#ba1a1a",
              "on-tertiary-container": "#b87500",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed": "#131b2e",
              "secondary": "#0051d5",
              "secondary-fixed": "#dbe1ff",
              "on-primary-container": "#7c839b",
              "on-surface": "#0b1c30",
              "primary": "#000000",
              "error-container": "#ffdad6",
              "surface": "#f8f9ff",
              "on-tertiary-fixed-variant": "#653e00",
              "on-primary-fixed-variant": "#3f465c",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffddb8",
              "primary-container": "#131b2e",
              "outline": "#76777d",
              "surface-container": "#e5eeff",
              "primary-fixed-dim": "#bec6e0",
              "on-background": "#0b1c30",
              "surface-container-low": "#eff4ff",
              "surface-variant": "#d3e4fe",
              "on-tertiary-fixed": "#2a1700",
              "inverse-surface": "#213145",
              "surface-container-highest": "#d3e4fe",
              "surface-tint": "#565e74",
              "surface-container-high": "#dce9ff",
              "secondary-fixed-dim": "#b4c5ff",
              "surface-bright": "#f8f9ff",
              "on-error": "#ffffff",
              "secondary-container": "#316bf3",
              "on-error-container": "#93000a",
              "on-secondary-fixed": "#00174b",
              "on-surface-variant": "#45464d",
              "tertiary-fixed-dim": "#ffb95f",
              "inverse-primary": "#bec6e0",
              "on-tertiary": "#ffffff",
              "outline-variant": "#c6c6cd",
              "tertiary-container": "#2a1700",
              "on-secondary-fixed-variant": "#003ea8",
              "tertiary": "#000000",
              "background": "#f8f9ff",
              "surface-dim": "#cbdbf5",
              "primary-fixed": "#dae2fd",
              "on-secondary": "#ffffff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .brand-font { font-family: 'Manrope', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased">
<!-- TopAppBar (Suppressed Shell for focused task, using simplified Header) -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-900" data-icon="close">close</span>
</button>
<span class="text-xl font-black tracking-tighter text-slate-900 font-headline uppercase">NORDIC</span>
</div>
<div class="flex items-center gap-2">
<span class="text-xs font-bold tracking-widest text-secondary uppercase">Step 2 of 3</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Progress Indicator -->
<div class="flex gap-2 mb-8">
<div class="h-1 flex-1 bg-secondary rounded-full"></div>
<div class="h-1 flex-1 bg-secondary rounded-full"></div>
<div class="h-1 flex-1 bg-surface-container-highest rounded-full"></div>
</div>
<section class="space-y-2 mb-10">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight">Reason for return</h1>
<p class="text-on-surface-variant leading-relaxed">Please let us know why you'd like to return the <span class="font-semibold text-on-surface">Oversized Wool Blazer</span>.</p>
</section>
<!-- Selected Item Preview Card -->
<div class="bg-surface-container-lowest rounded-xl p-4 mb-10 flex gap-4 items-center">
<div class="w-20 h-24 bg-surface-container-low rounded-lg overflow-hidden flex-shrink-0">
<img alt="Wool Blazer" class="w-full h-full object-cover" data-alt="high-end grey wool blazer draped on a minimalist wooden chair with soft natural lighting and neutral background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCegVc48aumyc0sQPoY9EwJphqjMzU7fNN_e0QyHYlkfaDssWzNQX78FEAtrSenBK6ICeZQe_iK879RvR3VlSPfmBxjyp_r1zYhdOjYxP_b0mo20VJxSo6zoVw0gCSSh8_r2fBUJjWMrnP3fyozmjV2e2mAMIrmLYibWdMzrpd3qDF8TVb2-7wxiVSc254XPHX2qLgBJBA5GYIaSBJK-Mf6lrgdljAy6PFRRr7Cc2m61ALspcwO4aMNUAGL-61huViX4S1Els16d1pn"/>
</div>
<div class="flex-1">
<span class="text-[10px] font-bold tracking-widest text-outline uppercase">Order #NRD-9921</span>
<h3 class="font-headline font-bold text-on-surface">Oversized Wool Blazer</h3>
<p class="text-sm text-on-surface-variant italic">Size: 38 (EU) • Grey Melange</p>
</div>
</div>
<!-- Return Reasons - Asymmetric/Editorial List -->
<div class="space-y-4">
<!-- Option 1: Active State -->
<button class="w-full text-left bg-surface-container-lowest p-5 rounded-xl border-2 border-secondary ring-4 ring-secondary/5 transition-all flex justify-between items-center group">
<div class="flex flex-col">
<span class="text-xs font-bold tracking-widest text-secondary uppercase mb-1">Most Common</span>
<span class="font-headline font-bold text-lg text-on-surface">Too big</span>
</div>
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
<!-- Option 2 -->
<button class="w-full text-left bg-surface-container-low p-5 rounded-xl border border-transparent hover:bg-surface-container-high active:scale-[0.98] transition-all flex justify-between items-center group">
<span class="font-headline font-semibold text-lg text-on-surface">Too small</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-outline transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option 3 -->
<button class="w-full text-left bg-surface-container-low p-5 rounded-xl border border-transparent hover:bg-surface-container-high active:scale-[0.98] transition-all flex justify-between items-center group">
<span class="font-headline font-semibold text-lg text-on-surface">Quality issue</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-outline transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
<!-- Option 4 -->
<button class="w-full text-left bg-surface-container-low p-5 rounded-xl border border-transparent hover:bg-surface-container-high active:scale-[0.98] transition-all flex justify-between items-center group">
<span class="font-headline font-semibold text-lg text-on-surface">Changed my mind</span>
<span class="material-symbols-outlined text-outline-variant group-hover:text-outline transition-colors" data-icon="radio_button_unchecked">radio_button_unchecked</span>
</button>
</div>
<!-- Additional Comments (Ghost Field) -->
<div class="mt-8">
<label class="text-[10px] font-bold tracking-widest text-outline uppercase block mb-2">Optional details</label>
<textarea class="w-full bg-surface-container-high border-none rounded-xl p-4 text-on-surface placeholder:text-outline/50 focus:ring-2 focus:ring-secondary/20 focus:bg-surface-container-lowest transition-all" placeholder="Tell us more about the fit..." rows="3"></textarea>
</div>
</main>
<!-- Fixed Action Bar (Floating Logic) -->
<div class="fixed bottom-0 left-0 right-0 bg-slate-50/90 backdrop-blur-md p-6 pb-10 flex gap-4 max-w-md mx-auto">
<button class="flex-1 h-14 bg-surface-container-low text-on-surface font-headline font-bold rounded-lg hover:bg-surface-container-high active:scale-95 transition-all">
            Back
        </button>
<button class="flex-[2] h-14 bg-secondary text-on-secondary font-headline font-bold rounded-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-95 transition-all shadow-xl shadow-secondary/20">
            Next Step
            <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-tertiary-fixed/10 rounded-full blur-3xl translate-y-1/2 -translate-x-1/2"></div>
</body></html>
