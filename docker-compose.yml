services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce_db}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ecommerce_user} -d ${POSTGRES_DB:-ecommerce_db}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://ecommerce_user:strongpassword@postgres:5432/ecommerce_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate deploy &&
      node dist/src/bootstrap/server.js"
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/ready').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://ecommerce_user:strongpassword@postgres:5432/ecommerce_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/src/bootstrap/worker.js"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const Redis=require('ioredis'); const redis=new Redis(process.env.REDIS_URL); const key=`${process.env.QUEUE_PREFIX || 'ecommerce'}:worker:heartbeat`; redis.get(key).then((value)=>{ redis.quit(); process.exit(value ? 0 : 1); }).catch(()=>process.exit(1));\""]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
