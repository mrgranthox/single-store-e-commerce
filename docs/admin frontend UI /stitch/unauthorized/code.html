            </h1>
<!-- Description (IBM Plex Sans) -->
<p class="font-body text-on-surface-variant text-lg leading-relaxed max-w-md mx-auto mb-10">
                You don't have permission to view this page. Contact your administrator if you believe this is an error.
            </p>
<!-- Action Cluster -->
<div class="flex flex-col sm:flex-row items-center justify-center gap-4">
<!-- Primary Button (8px radius, primary color) -->
<button class="command-gradient text-white font-semibold px-8 py-3 rounded-xl transition-all hover:scale-[1.02] active:scale-[0.98] flex items-center gap-2 group shadow-lg shadow-primary/20">
<span class="material-symbols-outlined !text-[20px]" data-icon="dashboard">
                        dashboard
                    </span>
                    Go to Dashboard
                </button>
<!-- Ghost Button (Sign out) -->
<button class="text-on-surface-variant font-medium px-8 py-3 rounded-xl hover:bg-surface-container transition-colors duration-200 flex items-center gap-2">
<span class="material-symbols-outlined !text-[20px]" data-icon="logout">
                        logout
                    </span>
                    Sign out
                </button>
</div>
<!-- System Trace Info (IBM Plex Mono) -->
<div class="mt-12 pt-8 border-t border-outline-variant/10">
<div class="flex flex-col gap-2">
<span class="font-mono text-[0.6875rem] uppercase tracking-[0.05em] text-outline">Reference Code</span>
<code class="font-mono text-sm text-secondary bg-surface-container px-3 py-1 rounded-md self-center">ERR_403_AUTH_SCOPE_MISSING</code>
</div>
</div>
</div>
<!-- Decorative Floating Elements -->
<div class="absolute -top-32 -left-32 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-32 -right-32 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
