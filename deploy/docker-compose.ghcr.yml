services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Runs once per `docker compose up` so multiple API replicas do not race on migrate deploy.
  migrate:
    image: ${BACKEND_IMAGE}
    restart: "no"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy"]

  api:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/src/bootstrap/server.js"]
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  worker:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["node", "dist/src/bootstrap/worker.js"]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"const Redis=require('ioredis'); const redis=new Redis(process.env.REDIS_URL); const key=`${process.env.QUEUE_PREFIX || 'ecommerce'}:worker:heartbeat`; redis.get(key).then((value)=>{ redis.quit(); process.exit(value ? 0 : 1); }).catch(()=>process.exit(1));\""
        ]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  postgres-data:
  redis-data:
